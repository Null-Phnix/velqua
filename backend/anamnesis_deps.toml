[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anamnesis"
version = "0.2.0"
description = "Memory architecture for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = []

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=2.2",
]
async = [
    "aiosqlite>=0.19",
]
vector = [
    "chromadb>=0.4",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
]

[project.scripts]
anamnesis = "src.cli:main"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
